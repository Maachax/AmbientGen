<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ambient Room</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0a0a0f;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #e0e0e0;
      }
      #start-screen {
        text-align: center;
        padding: 60px 40px;
        cursor: pointer;
        opacity: 0.8;
        transition: opacity 0.3s;
      }
      #start-screen:hover { opacity: 1; }
      h1 { font-size: 24px; font-weight: 300; letter-spacing: 8px; text-transform: uppercase; }
      p { font-size: 13px; opacity: 0.4; margin-top: 20px; }
    </style>
  </head>
  <body>
    <div id="start-screen">
      <h1>Ambient Room</h1>
      <p>click anywhere to begin</p>
    </div>
    <script type="module" src="./example.js"></script>
  </body>
</html>
